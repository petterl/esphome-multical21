name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest flake8 yamllint

      - name: Lint Python
        run: flake8 components/ tests/ --max-line-length 120

      - name: Lint YAML examples
        run: 'yamllint -d "{extends: relaxed, rules: {line-length: disable, truthy: disable}}" examples/'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - tests/build/esp32.yaml
          - tests/build/esp32-c3.yaml
          - tests/build/esp8266.yaml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache platform tooling
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ matrix.config }}-${{ hashFiles('components/multical21/**') }}
          restore-keys: |
            platformio-${{ matrix.config }}-

      - name: Install ESPHome
        run: pip install esphome

      - name: Compile ${{ matrix.config }}
        run: esphome compile ${{ matrix.config }}
