# Minimal CI build config — compiles the local multical21 component.
# Not for real use: meter_id/key are dummy values and no wifi/api is configured.
esphome:
  name: ci-test-esp32-c3

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf
    version: recommended

logger:

spi:
  id: spi_bus
  clk_pin: GPIO4
  mosi_pin: GPIO6
  miso_pin: GPIO5

external_components:
  - source:
      type: local
      path: ../../components
    components: [multical21]

multical21:
  id: water_meter
  spi_id: spi_bus
  cs_pin: GPIO7
  gdo0_pin: GPIO10
  meter_id: "12345678"
  key: "00112233445566778899AABBCCDDEEFF"

sensor:
  - platform: multical21
    multical21_id: water_meter
    total_consumption:
      name: "Total Water Consumption"
    current_flow:
      name: "Current Water Flow"
    water_temperature:
      name: "Water Temperature"
