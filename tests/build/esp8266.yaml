# Minimal CI build config — compiles the local multical21 component.
# Not for real use: meter_id/key are dummy values and no wifi/api is configured.
esphome:
  name: ci-test-esp8266

esp8266:
  board: d1_mini
  framework:
    version: recommended

logger:

spi:
  id: spi_bus
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

external_components:
  - source:
      type: local
      path: ../../components
    components: [multical21]

multical21:
  id: water_meter
  spi_id: spi_bus
  cs_pin: GPIO15
  gdo0_pin: GPIO5
  meter_id: "12345678"
  key: "00112233445566778899AABBCCDDEEFF"

sensor:
  - platform: multical21
    multical21_id: water_meter
    total_consumption:
      name: "Total Water Consumption"
    current_flow:
      name: "Current Water Flow"
    water_temperature:
      name: "Water Temperature"
